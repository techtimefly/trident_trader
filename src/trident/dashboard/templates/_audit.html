{% if rows %}
<table class="tt mono text-sm">
    <thead>
        <tr>
            <th>Time</th>
            <th>Event</th>
            <th>Actor</th>
            <th>Detail</th>
        </tr>
    </thead>
    <tbody>
        {% for r in rows %}
        <tr>
            <td class="dim">{{ r.ts }}</td>
            <td class="font-semibold">{{ r.event_type }}</td>
            <td class="dim">{{ r.actor }}</td>
            <td class="dim">{{ r.summary }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<div class="empty">No audit events in the last 24 hours.</div>
{% endif %}
